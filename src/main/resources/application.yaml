spring:
  application:
    name: Ai-interviewe-Sheshion

  autoconfigure:
    exclude:
      - org.springframework.ai.model.google.genai.autoconfigure.chat.GoogleGenAiChatAutoConfiguration

  datasource:
    url: jdbc:mysql://localhost:3306/ai_interview_db?createDatabaseIfNotExist=true
    username: root
    password: 1234 # Replace with your MySQL password
    driver-class-name: com.mysql.cj.jdbc.Driver

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        dialect: org.hibernate.dialect.MySQLDialect


  ai:
    openai:
      api-key: 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
      base-url: https://openrouter.ai/api
      chat:
        options:
          model: google/gemini-3-flash-preview
